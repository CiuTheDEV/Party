#:schema https://developers.openai.com/codex/config-schema.json

# Repo-scoped Codex config for Windows-native app usage
# Playwright-first, minimal friction, full access for trusted repositories only.

#model = "gpt-5.4"
model_provider = "openai"
service_tier = "fast"

#model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "none"
model_verbosity = "medium"
hide_agent_reasoning = true

# Safer than live browsing by default; switch in-app when you specifically need live fetches.
web_search = "cached"

# Keep more MCP / Playwright logs in context before truncation.
tool_output_token_limit = 12000

# Full-access mode: no sandbox boundary, no approval prompts.
# Use only in a trusted repo.
approval_policy = "never"
sandbox_mode = "danger-full-access"

personality = "pragmatic"
allow_login_shell = true
mcp_oauth_credentials_store = "keyring"

developer_instructions = """
Always respond in Polish unless the user explicitly asks for another language.
Be concise, pragmatic, and action-oriented.
For code edits, prefer minimal targeted diffs instead of rewriting entire files.
Preserve file structure, line endings, and encoding.
Assume UTF-8 by default, but verify actual bytes or repository conventions before declaring encoding corruption.
Do not claim mojibake unless it is confirmed from bytes, tool output, or repository conventions.
Avoid unnecessary reformatting, mass rewrites, and line-ending churn.
On Windows, prefer Windows-native commands and do not assume WSL.
For Playwright work, favor small reproducible steps and keep logs concise.
Before risky changes, briefly state the plan. After changes, summarize exactly what changed and what still needs verification.
"""

[history]
persistence = "none"

[agents]
max_threads = 1
max_depth = 1

[shell_environment_policy]
inherit = "all"
experimental_use_profile = true

[shell_environment_policy.set]
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"

[windows]
sandbox = "elevated"
sandbox_private_desktop = true

[tools]
view_image = true

[features]
multi_agent = true
prevent_idle_sleep = true

[mcp_servers.playwright]
enabled = true
required = false
command = "npx"
args = ["-y", "@playwright/mcp@0.0.70"]
startup_timeout_sec = 60
tool_timeout_sec = 300

[mcp_servers.context7]
enabled = true
required = false
url = "https://mcp.context7.com/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.github]
enabled = false
required = false
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_MCP_PAT"
startup_timeout_sec = 20
tool_timeout_sec = 120
